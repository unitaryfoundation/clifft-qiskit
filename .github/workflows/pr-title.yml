name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-title:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate conventional commit format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|perf|refactor|test|bench|build|ci|chore|style|revert)(\(.+\))?!?: .+'

          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow conventional commit format."
            echo ""
            echo "Expected: <type>[optional scope]: <description>"
            echo "Got:      $TITLE"
            echo ""
            echo "Valid types: feat, fix, docs, perf, refactor, test, bench, build, ci, chore, style, revert"
            echo "Examples:"
            echo "  feat: add Qiskit backend support"
            echo "  fix: reject unsupported measurement semantics"
            echo "  docs: update release process"
            exit 1
          fi

          echo "PR title is valid: $TITLE"
