name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        # Test the oldest supported Qiskit minor and the latest >=1.0 range.
        # The floor range catches accidental API creep; the wide range catches
        # compatibility breaks before widening to Qiskit 2.x.
        qiskit-range:
          - "qiskit>=1.0,<1.1"
          - "qiskit>=1.0"
        exclude:
          # Qiskit 1.0 ships no cp313 wheels, so skip the floor on Python 3.13.
          - python-version: "3.13"
            qiskit-range: "qiskit>=1.0,<1.1"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            uv sync --extra dev --upgrade
          else
            uv sync --extra dev --locked
          fi
          uv pip install --upgrade "${{ matrix.qiskit-range }}"
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest
      - name: Build distributions
        if: matrix.python-version == '3.12' && matrix.qiskit-range == 'qiskit>=1.0'
        run: uv build
      - name: Check package metadata
        if: matrix.python-version == '3.12' && matrix.qiskit-range == 'qiskit>=1.0'
        run: uv run twine check dist/*
      - name: Test installed wheel
        if: matrix.python-version == '3.12' && matrix.qiskit-range == 'qiskit>=1.0'
        run: |
          python -m venv .wheel-smoke
          .wheel-smoke/bin/python -m pip install -U pip
          .wheel-smoke/bin/python -m pip install 'pytest>=8.0' 'qiskit-aer>=0.15' dist/*.whl
          .wheel-smoke/bin/python -m pytest tests -q
